# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

before:
  hooks:
    - go mod tidy
    - sh -c "cp internal/providers/catalog.json dist/catalog.json && if command -v cosign >/dev/null 2>&1; then cosign sign-blob --bundle dist/catalog.json.sigstore.json dist/catalog.json --yes; else echo 'catalog signing skipped (cosign not in PATH)'; fi"

builds:
  - id: kairo
    binary: kairo
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
      - -tags=osusergo,netgo
    ldflags:
      - -s -w
      - -X github.com/dkmnx/kairo/internal/version.Version={{.Tag}}
      - -X github.com/dkmnx/kairo/internal/version.Commit={{.Commit}}
      - -X github.com/dkmnx/kairo/internal/version.Date={{.Date}}
    env:
      - CGO_ENABLED=0

archives:
  - id: kairo
    formats: ["tar.gz", "zip"]
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        formats: ["zip"]
    files:
      - src: LICENSE
        dst: LICENSE
      - src: README.md
        dst: README.md

checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_checksums.txt'
  algorithm: sha256

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes
    artifacts: checksum
    output: true

changelog:
  # Disable auto-generated changelog since CHANGELOG.md is maintained manually
  disable: true

release:
  extra_files:
    - glob: ./internal/providers/catalog.json
    - glob: ./dist/catalog.json.sigstore.json
  footer: |

    ---

    ### Provider catalog

    The provider catalog is published as a release artifact for the `kairo providers refresh` command:
      - `catalog.json` — provider definitions
      - `catalog.json.sigstore.json` — cosign sigstore bundle (verify with `cosign verify-blob --bundle catalog.json.sigstore.json --certificate-identity-regexp '^https://github\.com/dkmnx/kairo/\.github/workflows/release\.yml$' --certificate-oidc-issuer https://token.actions.githubusercontent.com catalog.json`)

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
