version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly
linters:
  default: none
  settings:
    cyclop:
      max-complexity: 25
    errcheck:
      check-type-assertions: true
      check-blank: false
    exhaustive:
      default-signifies-exhaustive: true
    funlen:
      lines: 100
      statements: 50
    gocognit:
      min-complexity: 25
    goconst:
      min-len: 10
      min-occurrences: 10
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - exitAfterDefer
    gocyclo:
      max-complexity: 25
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
        - unusedwrite
        - nilness
    lll:
      line-length: 120
    misspell:
      locale: US
    nakedret:
      max-func-lines: 100
    nestif:
      min-complexity: 15
    noctx:
      send-checks: true
      recv-checks: true
    unconvert:
      check-type-assertions: true
      check-decl-assign: true
    unparam:
      check-type-assertions: true
    staticcheck:
      checks:
        - all
        - -ST1005
  enable:
    - bodyclose
    - cyclop
    - errcheck
    - errorlint
    - exhaustive
    - funlen
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - nestif
    - nlreturn
    - noctx
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - cyclop
          - errcheck
          - errorlint
          - funlen
          - gocognit
          - goconst
          - gocritic
          - gocyclo
          - gosec
          - lll
          - nestif
          - nlreturn
          - noctx
          - staticcheck
          - unparam
        path: _test\.go
      - linters:
          - goconst
          - gocyclo
          - govet
          - ineffassign
          - staticcheck
          - unconvert
          - unparam
          - unused
        path: \.pb\.go
      - linters:
          - goconst
          - gocritic
        path: tests/integration
      - linters:
          - goconst
        path: main\.go
      - linters:
          - goconst
        path: cmd/harness\.go
      - linters:
          - staticcheck
        text: exported (function|method|type|const)
      - linters:
          - staticcheck
        text: commented out
      # gocritic: hugeParam is too noisy for struct params in prod code
      - linters:
          - gocritic
        text: hugeParam
      # gocritic: unnamedResult is cosmetic
      - linters:
          - gocritic
        text: unnamedResult
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
