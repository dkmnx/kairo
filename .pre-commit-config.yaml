repos:
  - repo: local
    hooks:
      - id: update-checksums
        name: Update install script checksums
        entry: bash -c 'for f in "$@"; do dir=$(dirname "$f"); printf "# Kairo release checksums\n# DO NOT EDIT - This file is auto-generated during release\n\n" > "$dir/checksums.txt"; for s in "$dir"/install.{sh,ps1}; do [ -f "$s" ] && sha256sum "$s" >> "$dir/checksums.txt"; done; git add "$dir/checksums.txt"; done'
        language: system
        files: scripts/install\.(sh|ps1)$
        pass_filenames: true
        stages: [pre-commit]

      - id: golangci-lint
        name: Run golangci-lint
        entry: bash -c "export PATH=\"$GOPATH/bin:$PATH\"; golangci-lint run ./..."
        language: system
        files: \.go$
        pass_filenames: false

      - id: go-test
        name: Run Go tests
        entry: go test -race ./...
        language: system
        files: \.go$
        pass_filenames: false
        always_run: false

      - id: go-mod-tidy
        name: Check go.mod tidy
        entry: bash -c "go mod tidy && git diff --exit-code go.mod go.sum"
        language: system
        files: go\.(mod|sum)$
        pass_filenames: false

ci:
  autoupdate_commit_msg: "chore: update pre-commit hooks"
